services:
  silo:
    build:
      context: .
      dockerfile: Dockerfile.silo
    container_name: silo
    volumes:
      - silo-data:/data
      - repos-data:/data/repos
      - worktrees-data:/data/worktrees
      - ./seed:/app/seed:ro
      - ~/.claude:/claude-host:ro
      - ./agents:/claude-agents:ro
    environment:
      SILO_DB_PATH: /data/silo.db
      SILO_ADMIN_TOKEN: ${SILO_ADMIN_TOKEN}
      SILO_WORKER_TOKEN: ${SILO_WORKER_TOKEN}
      SILO_SEED_ROOT: /
      SILO_CORS_ORIGIN: http://localhost:3000,http://localhost:3001,http://battleaxe:3000
      DUMMY_MODE: ${DUMMY_MODE:-}
      LINEAR_API_KEY: ${LINEAR_API_KEY}
      RADAR_AGENTS_DIR: /claude-agents
    ports:
      - "3001:3001"
    networks:
      - pipeline
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/api/status"]
      interval: 5s
      retries: 10
      start_period: 15s

  norad:
    build:
      context: ~/norad
      dockerfile: /home/tsavo/cheyenne-mountain/Dockerfile.norad
      args:
        NEXT_PUBLIC_SILO_WS_URL: ${NORAD_SILO_WS_URL:-}
        NEXT_PUBLIC_SILO_WS_TOKEN: ${SILO_ADMIN_TOKEN}
    container_name: norad
    environment:
      SILO_URL: http://silo:3001
      SILO_ADMIN_TOKEN: ${SILO_ADMIN_TOKEN}
      NEXT_PUBLIC_SILO_WS_URL: ${NORAD_SILO_WS_URL:-}
      NEXT_PUBLIC_SILO_WS_TOKEN: ${SILO_ADMIN_TOKEN}
    ports:
      - "3000:3000"
    networks:
      - pipeline
    depends_on:
      silo:
        condition: service_healthy

networks:
  pipeline:
    driver: bridge

volumes:
  silo-data:
  repos-data:
  worktrees-data:
